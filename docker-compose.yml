services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1
      - CHROMA_DIR=/app/chroma_db
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_db

volumes:
  ollama_models:
  chroma_data:
